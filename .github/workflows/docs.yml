name: Deploy Documentation
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz cmake

      - name: Prepare Documentation Directory
        run: mkdir -p build/docs

      - name: Setup and Run Doxygen
        uses: mattnotmitt/doxygen-action@v1
        with:
          doxyfile-path: ./Doxyfile
          working-directory: .

      - name: Post-process Documentation
        run: |
          sudo chown -R $USER:$USER build/docs
          mkdir -p build/docs/html
          touch build/docs/html/.nojekyll

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/docs/html
          branch: gh-pages
